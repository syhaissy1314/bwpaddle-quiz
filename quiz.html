<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes"><title>燕云十六声 · 门派测试</title><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap');*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;min-height:100%;font-family:'Noto Serif SC','SimSun','STSong','Songti SC',serif}body{background:#0a0604;display:flex;align-items:center;justify-content:center}.page{width:100%;max-width:480px;min-height:100vh;padding:24px 20px;position:relative}body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(80,50,20,0.15),transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(40,30,60,0.12),transparent 50%);pointer-events:none}#start{text-align:center;padding-top:15vh}#start h1{font-size:36px;font-weight:900;color:#d4a84b;letter-spacing:8px;text-shadow:0 0 30px rgba(212,168,75,0.3)}#start .sub{font-size:15px;color:#8a7a6a;margin-top:8px;letter-spacing:4px}#start .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#d4a84b,transparent);margin:30px auto}#start .desc{color:#9a8a7a;font-size:14px;line-height:1.9;max-width:320px;margin:0 auto;letter-spacing:1px}.btn{display:inline-block;padding:14px 48px;font-family:inherit;font-size:16px;font-weight:700;color:#0a0604;background:linear-gradient(135deg,#d4a84b,#b8923a);border:none;border-radius:4px;cursor:pointer;letter-spacing:4px;transition:all 0.3s;margin-top:36px;box-shadow:0 4px 20px rgba(212,168,75,0.25)}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(212,168,75,0.4)}.btn:active{transform:translateY(0)}#quiz{display:none}.progress{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:32px}.progress-bar{height:100%;background:linear-gradient(90deg,#b8923a,#d4a84b);border-radius:2px;transition:width 0.5s ease}.q-num{font-size:13px;color:#6a5a4a;letter-spacing:2px;margin-bottom:6px}.q-text{font-size:19px;color:#d0c0b0;font-weight:700;line-height:1.6;margin-bottom:28px;letter-spacing:1px;min-height:60px}.options{display:flex;flex-direction:column;gap:10px}.option{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:14px 18px;color:#aa9a8a;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:all 0.25s;letter-spacing:0.5px;line-height:1.5}.option:hover{background:rgba(212,168,75,0.08);border-color:rgba(212,168,75,0.25);color:#d0c0b0}.option.selected{background:rgba(212,168,75,0.12);border-color:#d4a84b;color:#d4a84b}.option .tag{display:inline-block;font-size:11px;color:#6a5a4a;margin-right:8px}#result{display:none;text-align:center;padding-top:8vh;animation:fadeIn 0.6s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}#result .badge{width:100px;height:100px;margin:0 auto 20px;background:radial-gradient(circle,rgba(212,168,75,0.15),transparent);border:2px solid rgba(212,168,75,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px}#result .r-title{font-size:14px;color:#8a7a6a;letter-spacing:3px;margin-bottom:4px}#result .r-name{font-size:34px;font-weight:900;color:#d4a84b;letter-spacing:6px;text-shadow:0 0 20px rgba(212,168,75,0.2);margin-bottom:8px}#result .r-sub{font-size:16px;color:#b0a090;font-weight:600;letter-spacing:2px;margin-bottom:24px}#result .r-desc{font-size:14px;color:#8a7a6a;line-height:2;max-width:360px;margin:0 auto;letter-spacing:1px}#result .r-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px}#result .r-tag{padding:6px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;font-size:12px;color:#9a8a7a;letter-spacing:1px}#result .r-divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,#d4a84b,transparent);margin:28px auto}#result .btn{margin-top:0}</style></head><body><div class="page" id="app"><div id="start"><h1>燕云</h1><div class="sub">十 六 声</div><div class="divider"></div><div class="desc">茫茫江湖，何处是归途？<br>八大奇门，哪一派才是你的归宿？<br>静心回答以下问题，测出你的本命门派。</div><button class="btn" onclick="startQuiz()">开 始 测 试</button></div><div id="quiz"><div class="progress"><div class="progress-bar" id="progBar"></div></div><div class="q-num" id="qNum"></div><div class="q-text" id="qText"></div><div class="options" id="qOpts"></div></div><div id="result"><div class="badge" id="rEmoji"></div><div class="r-title">你的本命门派是</div><div class="r-name" id="rName"></div><div class="r-sub" id="rSub"></div><div class="r-divider"></div><div class="r-desc" id="rDesc"></div><div class="r-tags" id="rTags"></div><div class="r-divider"></div><button class="btn" onclick="startQuiz()">重 测 一 次</button></div></div><script>
const FACTIONS={jiuliu:{name:'九流门',emoji:'\ud83c\udfad',sub:'三教九流 - 市井智慧',desc:'你来自市井之间，三教九流无所不交。道德观念灵活变通，善于用街头智慧和过人骗术获取资源与功法。但门规森严，绝不可欺压弱小。你灵活机敏，什么样的江湖都混得开。',tags:['市井','智慧','灵活','义气']},zuihuayin:{name:'醉花阴',emoji:'\u2602\ufe0f',sub:'歌舞乐伎 - 伞下藏锋',desc:'你出自开封樊楼，表面是歌舞乐伎，以伞为兵器，姿态柔美动人。然而这一切皆为伪装，你的真实身份是情报传递者，杀伐果决。乱花丛中过，片叶不沾身。你是江湖中最美的暗器。',tags:['歌舞','伪装','情报','飒爽']},tianquan:{name:'天泉',emoji:'\u2696\ufe0f',sub:'公义为刃 - 陌刀无双',desc:'你不隶属于任何国家或权贵，唯以公义为重。天泉门下使一柄陌刀，攻守兼备。你是行走的正义，是暗夜中的一束光。',tags:['公义','陌刀','守护','正义']},sangengtian:{name:'三更天',emoji:'\ud83c\udf19',sub:'三更月下 - 双刀索命',desc:'你属于黑夜。三更天弟子使双刀，身法鬼魅，出招迅猛。你是黑暗中的利刃，出手即定乾坤。',tags:['双刀','夜行','爆发','凌厉']},qingxi:{name:'青溪',emoji:'\ud83e\udead',sub:'悬壶济世 - 扇舞春风',desc:'你出自青溪，精通医术与辅助之道。一柄扇子在你手中既可远攻制敌，又能救治队友。你的内心温柔而坚定，总在他人最需要时伸出援手。',tags:['医术','辅助','扇子','仁心']},kuanglan:{name:'狂澜',emoji:'\ud83c\udf0a',sub:'长枪破浪 - 水缚苍龙',desc:'你天生与水结缘，善以水元素之力克敌制胜。一杆长枪在手，枪出如龙、水势如虹。战斗中你能借助水流之力重创敌人，气势如狂澜般不可阻挡。',tags:['水','长枪','刚猛','气势']},liyuan:{name:'梨园',emoji:'\ud83c\udfad',sub:'戏中有武 - 梨园惊梦',desc:'你将表演与武学完美融合。梨园弟子能歌善舞，举手投足间皆是杀招。你的每一次转身、每一个亮相，既是令人沉醉的表演，也是致命的武学。',tags:['戏曲','舞蹈','华丽','灵动']},guyun:{name:'孤云',emoji:'\u2601\ufe0f',sub:'天机算尽 - 以算破招',desc:'你精于算学与天象，能推演万物运行规律。孤云门下以算破招，料敌先机。你冷静理性，凡事讲究谋定而后动。',tags:['算学','天象','谋略','冷静']}};const FACTION_KEYS=Object.keys(FACTIONS);const QUESTIONS=[{q:'你更偏爱以下哪种处世之道？',opts:[{t:'灵活变通，不拘一格，结果最重要',f:['jiuliu',3,'kuanglan',2,'sangengtian',1]},{t:'光明磊落，坚守道义，问心无愧',f:['tianquan',3,'guyun',2,'qingxi',1]},{t:'低调内敛，深藏不露，暗中行事',f:['zuihuayin',3,'sangengtian',2,'liyuan',1]},{t:'随心所欲，人生如戏，快意恩仇',f:['liyuan',3,'jiuliu',2,'kuanglan',1]}]},{q:'闯荡江湖，你最想带什么兵器？',opts:[{t:'一柄陌刀，堂堂正正，攻守兼备',f:['tianquan',3,'kuanglan',2,'guyun',1]},{t:'一把折扇，风雅之中暗藏玄机',f:['qingxi',3,'zuihuayin',2,'liyuan',1]},{t:'两把短刃，来去如风，一击必杀',f:['sangengtian',3,'zuihuayin',2,'jiuliu',1]},{t:'一杆长枪，一往无前，气势如虹',f:['kuanglan',3,'tianquan',2,'liyuan',1]}]},{q:'你最擅长的事情是什么？',opts:[{t:'察言观色，见人说人话见鬼说鬼话',f:['jiuliu',3,'zuihuayin',2,'sangengtian',1]},{t:'推演算计，运筹帷幄之中决胜千里',f:['guyun',3,'tianquan',2,'jiuliu',1]},{t:'歌舞表演，用艺术打动每一个人',f:['liyuan',3,'zuihuayin',2,'qingxi',1]},{t:'救死扶伤，用自己的能力帮助他人',f:['qingxi',3,'tianquan',2,'guyun',1]}]},{q:'别人通常用哪三个词形容你？',opts:[{t:'精明、灵活、不按常理出牌',f:['jiuliu',3,'sangengtian',2,'zuihuayin',1]},{t:'正义、可靠、让人有安全感',f:['tianquan',3,'qingxi',2,'kuanglan',1]},{t:'神秘、优雅、让人看不透',f:['zuihuayin',3,'liyuan',2,'sangengtian',1]},{t:'冷静、理性、数学很好',f:['guyun',3,'tianquan',2,'jiuliu',1]}]},{q:'如果参加一场武林大会，你的策略是？',opts:[{t:'赛前收集情报，了解每个对手的底细',f:['jiuliu',3,'guyun',2,'zuihuayin',1]},{t:'正面迎战，用实力碾压一切对手',f:['kuanglan',3,'tianquan',2,'sangengtian',1]},{t:'先观察局势，找到最佳时机再出手',f:['sangengtian',3,'guyun',2,'qingxi',1]},{t:'用自己的风格打一场漂亮的表演战',f:['liyuan',3,'zuihuayin',2,'kuanglan',1]}]},{q:'你对江湖的理解更接近哪个？',opts:[{t:'江湖是名利场，有手段就能出头',f:['jiuliu',3,'zuihuayin',2,'sangengtian',1]},{t:'江湖是战场，强者为尊，实力说话',f:['kuanglan',3,'tianquan',2,'sangengtian',1]},{t:'江湖是舞台，每个人都在演自己的戏',f:['liyuan',3,'zuihuayin',2,'jiuliu',1]},{t:'江湖是棋局，每一步都要精打细算',f:['guyun',3,'tianquan',2,'qingxi',1]}]},{q:'你最想习得哪种武学境界？',opts:[{t:'随心所欲，不拘招式，以意驭剑',f:['jiuliu',3,'liyuan',2,'kuanglan',1]},{t:'以柔克刚，四两拨千斤的化劲之道',f:['qingxi',3,'guyun',2,'tianquan',1]},{t:'一力降十会，绝对力量碾压一切',f:['kuanglan',3,'tianquan',2,'sangengtian',1]},{t:'料敌先机，敌人出招前已破其招',f:['guyun',3,'sangengtian',2,'jiuliu',1]}]},{q:'你理想中的江湖生活是什么样的？',opts:[{t:'混迹市井，结交各路朋友，自在逍遥',f:['jiuliu',3,'liyuan',2,'zuihuayin',1]},{t:'行侠仗义，路见不平一声吼',f:['tianquan',3,'kuanglan',2,'qingxi',1]},{t:'隐于闹市，经营自己的小天地',f:['zuihuayin',3,'qingxi',2,'guyun',1]},{t:'云游四方，探索天下的奥秘',f:['guyun',3,'liyuan',2,'kuanglan',1]}]},{q:'你的队友通常会怎么评价你？',opts:[{t:'这家伙鬼点子真多，总能找到出路',f:['jiuliu',3,'liyuan',2,'zuihuayin',1]},{t:'有你在就安心，特别靠谱',f:['tianquan',3,'qingxi',2,'kuanglan',1]},{t:'深藏不露，永远看不透你',f:['zuihuayin',3,'sangengtian',2,'guyun',1]},{t:'算得太准了，料事如神',f:['guyun',3,'jiuliu',2,'tianquan',1]}]},{q:'你最喜欢哪种自然元素？',opts:[{t:'水——柔中带刚，随形而变',f:['kuanglan',3,'qingxi',2,'guyun',1]},{t:'火——热烈奔放，不可阻挡',f:['sangengtian',3,'liyuan',2,'tianquan',1]},{t:'风——来去无踪，自由自在',f:['zuihuayin',3,'jiuliu',2,'sangengtian',1]},{t:'山——稳重如山，不可动摇',f:['tianquan',3,'guyun',2,'kuanglan',1]}]},{q:'面对强敌时你的第一反应是？',opts:[{t:'先周旋试探，找破绽再出手',f:['zuihuayin',3,'sangengtian',2,'guyun',1]},{t:'正面迎战，绝不后退一步',f:['tianquan',3,'kuanglan',2,'qingxi',1]},{t:'先动嘴，能忽悠就忽悠过去',f:['jiuliu',3,'liyuan',2,'zuihuayin',1]},{t:'先观察分析，计算对手弱点',f:['guyun',3,'jiuliu',2,'sangengtian',1]}]},{q:'你理想中的师徒关系是什么样？',opts:[{t:'亦师亦友，互相学习，无话不谈',f:['jiuliu',3,'liyuan',2,'zuihuayin',1]},{t:'严谨传承，一板一眼，尊师重道',f:['tianquan',3,'guyun',2,'kuanglan',1]},{t:'言传身教，如父如子，温暖包容',f:['qingxi',3,'kuanglan',2,'tianquan',1]},{t:'各自修行，有缘则聚，自在洒脱',f:['zuihuayin',3,'sangengtian',2,'liyuan',1]}]},{q:'什么情况下你会破例出手？',opts:[{t:'有人欺负弱小，看不过去',f:['jiuliu',3,'tianquan',2,'kuanglan',1]},{t:'朋友遇到危险，必须保护',f:['qingxi',3,'kuanglan',2,'tianquan',1]},{t:'遇到值得一战的强大对手',f:['sangengtian',3,'liyuan',2,'zuihuayin',1]},{t:'局势需要有人打破平衡',f:['zuihuayin',3,'guyun',2,'sangengtian',1]}]},{q:'你更看重什么？',opts:[{t:'结果——成王败寇，只看输赢',f:['jiuliu',3,'sangengtian',2,'kuanglan',1]},{t:'道义——对得起自己的良心',f:['tianquan',3,'qingxi',2,'guyun',1]},{t:'过程——享受每一刻的精彩',f:['liyuan',3,'zuihuayin',2,'kuanglan',1]},{t:'真相——探求万事万物的本质',f:['guyun',3,'qingxi',2,'jiuliu',1]}]},{q:'你更喜欢在什么环境下修行？',opts:[{t:'热闹的市井街头，与人交往',f:['jiuliu',3,'zuihuayin',2,'liyuan',1]},{t:'幽静的山谷溪边，亲近自然',f:['qingxi',3,'guyun',2,'kuanglan',1]},{t:'雄壮的瀑布之畔，锤炼意志',f:['kuanglan',3,'tianquan',2,'sangengtian',1]},{t:'月下的屋顶之上，独享宁静',f:['sangengtian',3,'liyuan',2,'guyun',1]}]}];let a=[],q=0;function startQuiz(){document.getElementById('start').style.display='none';document.getElementById('result').style.display='none';document.getElementById('quiz').style.display='block';a=[];q=0;r()}function r(){const t=QUESTIONS[q];document.getElementById('qNum').textContent='第 '+(q+1)+'/'+QUESTIONS.length+' 问';document.getElementById('qText').textContent=t.q;document.getElementById('progBar').style.width=((q+1)/QUESTIONS.length*100)+'%';const c=document.getElementById('qOpts');c.innerHTML='';t.opts.forEach((o,i)=>{const b=document.createElement('button');b.className='option';if(a[q]===i)b.className+=' selected';b.innerHTML='<span class=tag>'+(['甲','乙','丙','丁'][i])+'</span>'+o.t;b.onclick=()=>s(i);c.appendChild(b)})}function s(i){a[q]=i;document.querySelectorAll('.option').forEach((el,j)=>{el.className=j===i?'option selected':'option'});setTimeout(function(){if(q<QUESTIONS.length-1){q++;r()}else t()},300)}function t(){document.getElementById('quiz').style.display='none';const scores={};FACTION_KEYS.forEach(function(k){scores[k]=0});QUESTIONS.forEach(function(v,i){const ch=v.opts[a[i]];if(ch&&ch.f){for(var j=0;j<ch.f.length;j+=2){scores[ch.f[j]]=(scores[ch.f[j]]||0)+ch.f[j+1]}}});var top=FACTION_KEYS[0],maxScore=scores[FACTION_KEYS[0]];FACTION_KEYS.forEach(function(k){if(scores[k]>maxScore){maxScore=scores[k];top=k}});const f=FACTIONS[top];document.getElementById('rEmoji').textContent=f.emoji;document.getElementById('rName').textContent=f.name;document.getElementById('rSub').textContent=f.sub;document.getElementById('rDesc').textContent=f.desc;const te=document.getElementById('rTags');te.innerHTML='';f.tags.forEach(function(t){const s=document.createElement('span');s.className='r-tag';s.textContent=t;te.appendChild(s)});document.getElementById('result').style.display='block'}</script></body></html>
