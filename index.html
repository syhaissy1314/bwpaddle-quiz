<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>黑白击球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d1a;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W,H,cx,cy;
function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
    cx=W/2;cy=H/2;
}
resize();
window.addEventListener('resize',resize);

// constants
const BALL_R=Math.min(W,H)*0.035;
const PADDLE_W=Math.min(W,H)*0.45;
const PADDLE_H=Math.min(W,H)*0.035;
const BASE_SPEED=Math.min(W,H)*0.004;
const MAX_SPEED=BASE_SPEED*3;
const COLOR_INTERVAL_MIN=1800;
const COLOR_INTERVAL_MAX=3500;
const PADDLE_FRICTION=0.92;
const PADDLE_DRAG=0.012;
const PADDLE_VMAX=0.25;
const COLORS={black:'#111',white:'#e8e8e8'};

// state
let state={};
let particles=[];

function initGame(){
    const angle=Math.random()*Math.PI*2;
    const spd=BASE_SPEED*1.2;
    state={
        ball:{
            x:cx, y:cy-H*0.25,
            vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
            color:'white', nextColor:'black', colorLerp:0, r:BALL_R
        },
        paddle:{angle:0, velocity:0, lastTouchX:null},
        score:0,
        best:parseInt(localStorage.getItem('bwBest')||'0'),
        gameOver:false,
        combo:0,
        colorTimer:nextColorTime(),
        displayColor:'#e8e8e8',
    };
    particles=[];
}

function nextColorTime(){
    return Date.now()+COLOR_INTERVAL_MIN+Math.random()*(COLOR_INTERVAL_MAX-COLOR_INTERVAL_MIN);
}

// color blending
function lerpColor(c1,c2,t){
    const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
    const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// paddle collision (rotated rectangle)
function paddleHitTest(bx,by,br){
    const p=state.paddle;
    const cos=Math.cos(p.angle), sin=Math.sin(p.angle);
    const dx=bx-cx, dy=by-cy;
    const lx=dx*cos+dy*sin;
    const ly=-dx*sin+dy*cos;
    const hw=PADDLE_W/2, hh=PADDLE_H/2;
    const cx1=Math.max(-hw,Math.min(hw,lx));
    const cy1=Math.max(-hh,Math.min(hh,ly));
    const ddx=lx-cx1, ddy=ly-cy1;
    if(Math.sqrt(ddx*ddx+ddy*ddy)<br){
        const side=lx<0?'left':'right';
        return {hit:true, localColor:side==='left'?'white':'black', cx:cx1, cy:cy1};
    }
    return {hit:false};
}

// particles
function spawnParticles(x,y,color,count){
    for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2;
        const s=2+Math.random()*5;
        particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.015+Math.random()*0.02,color,r:2+Math.random()*3});
    }
}
function updateParticles(){
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy;
        p.vx*=0.98; p.vy*=0.98;
        p.life-=p.decay;
        if(p.life<=0)particles.splice(i,1);
    }
}
function drawParticles(){
    for(const p of particles){
        ctx.globalAlpha=p.life;
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
}

// ---- update ----
function update(){
    if(state.gameOver)return;
    const b=state.ball;
    const p=state.paddle;

    // paddle momentum
    p.angle+=p.velocity;
    p.velocity*=PADDLE_FRICTION;
    if(Math.abs(p.velocity)<0.0005)p.velocity=0;

    // color timer
    if(Date.now()>state.colorTimer){
        b.color=b.nextColor;
        b.nextColor=b.color==='black'?'white':'black';
        b.colorLerp=0;
        state.colorTimer=nextColorTime();
        spawnParticles(b.x,b.y,COLORS[b.color],8);
    }
    if(b.colorLerp<1)b.colorLerp=Math.min(1,b.colorLerp+0.035);

    // store display color for draw()
    state.displayColor=lerpColor(COLORS[b.color],COLORS[b.nextColor],1-b.colorLerp);

    // move ball
    b.x+=b.vx; b.y+=b.vy;

    // wall bounce
    const m=b.r;
    if(b.x<m){b.x=m; b.vx=-b.vx}
    if(b.x>W-m){b.x=W-m; b.vx=-b.vx}
    if(b.y<m){b.y=m; b.vy=-b.vy}
    if(b.y>H-m){b.y=H-m; b.vy=-b.vy}

    // speed limit
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(spd>MAX_SPEED){b.vx=b.vx/spd*MAX_SPEED; b.vy=b.vy/spd*MAX_SPEED}
    if(spd<BASE_SPEED*0.5&&spd>0){b.vx=b.vx/spd*BASE_SPEED*0.5; b.vy=b.vy/spd*BASE_SPEED*0.5}

    // paddle collision
    const h=paddleHitTest(b.x,b.y,b.r);
    if(h.hit){
        const nx=b.x-(cx+(h.cx*Math.cos(p.angle)-h.cy*Math.sin(p.angle)));
        const ny=b.y-(cy+(h.cx*Math.sin(p.angle)+h.cy*Math.cos(p.angle)));
        const nd=Math.sqrt(nx*nx+ny*ny)||1;
        const dot=b.vx*(nx/nd)+b.vy*(ny/nd);
        if(dot<0){
            b.vx-=2*dot*(nx/nd); b.vy-=2*dot*(ny/nd);
            b.x+=nx/nd*2; b.y+=ny/nd*2;
            if(b.color===h.localColor){
                state.score++; state.combo++;
                spawnParticles(b.x,b.y,COLORS[b.color],15);
                const scale=Math.min(1+state.combo*0.03,1.5);
                b.vx*=scale; b.vy*=scale;
            }else{
                state.gameOver=true;
                spawnParticles(b.x,b.y,'#ff3333',30);
                if(state.score>state.best){state.best=state.score; localStorage.setItem('bwBest',String(state.score))}
            }
        }
    }else{state.combo=0}
    updateParticles();
}

// ---- draw ----
function draw(){
    ctx.clearRect(0,0,W,H);
    const b=state.ball;

    // subtle grid
    ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

    // paddle
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(state.paddle.angle);
    const hw=PADDLE_W/2, hh=PADDLE_H/2;
    // wood base
    ctx.fillStyle='#DEB887'; ctx.beginPath(); ctx.roundRect(-hw,-hh,PADDLE_W,PADDLE_H,6); ctx.fill();
    // grain
    ctx.strokeStyle='rgba(139,90,43,0.3)'; ctx.lineWidth=1;
    for(let i=-hw+10;i<hw-10;i+=12){ctx.beginPath();ctx.moveTo(i,-hh+2);ctx.lineTo(i+4,hh-2);ctx.stroke()}
    // white end
    ctx.fillStyle='#f5f5f5'; ctx.beginPath(); ctx.roundRect(-hw+2,-hh+3,PADDLE_W/2-3,PADDLE_H-6,4); ctx.fill();
    ctx.fillStyle='#666'; ctx.font=`bold ${PADDLE_H*0.55}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('白',-hw/2,0);
    // black end
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.roundRect(1,-hh+3,PADDLE_W/2-3,PADDLE_H-6,4); ctx.fill();
    ctx.fillStyle='#999'; ctx.font=`bold ${PADDLE_H*0.55}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('黑',hw/2,0);
    // divider & border
    ctx.strokeStyle='#8B6914'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,-hh+4); ctx.lineTo(0,hh-4); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(-hw,-hh,PADDLE_W,PADDLE_H,6); ctx.stroke();
    ctx.restore();

    // ball glow
    const glow=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);
    if(b.color==='white'){glow.addColorStop(0,'rgba(255,255,255,0.3)');glow.addColorStop(1,'rgba(255,255,255,0)')}
    else{glow.addColorStop(0,'rgba(200,200,255,0.15)');glow.addColorStop(1,'rgba(200,200,255,0)')}
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*2.5,0,Math.PI*2); ctx.fill();

    // ball body (blended color)
    ctx.fillStyle=state.displayColor;
    ctx.shadowColor=b.color==='white'?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.1)';
    ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // highlight
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.ellipse(b.x-b.r*0.25,b.y-b.r*0.25,b.r*0.35,b.r*0.2,-0.5,0,Math.PI*2); ctx.fill();

    // transition ring
    if(b.colorLerp<1){
        const pulse=Math.sin(b.colorLerp*Math.PI);
        ctx.strokeStyle=`rgba(255,255,255,${pulse*0.4})`; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(b.x,b.y,b.r+6+pulse*6,0,Math.PI*2); ctx.stroke();
    }

    // particles
    drawParticles();

    // score
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font=`bold ${Math.min(W,H)*0.07}px "SF Pro Display","Helvetica Neue",Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(`${state.score}`,cx,Math.min(H*0.04,20));
    // best
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.font=`${Math.min(W,H)*0.035}px "SF Pro Display","Helvetica Neue",Arial,sans-serif`;
    ctx.fillText(`最高 ${state.best}`,cx,Math.min(H*0.04,20)+Math.min(W,H)*0.075);

    // color indicator
    const indY=H*0.85;
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.roundRect(cx-65,indY-14,130,28,14); ctx.fill();
    ctx.fillStyle=state.displayColor; ctx.beginPath(); ctx.arc(cx-25,indY,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('→',cx+3,indY);
    ctx.fillStyle=COLORS[b.nextColor]; ctx.beginPath(); ctx.arc(cx+30,indY,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font=`${Math.min(W,H)*0.028}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.color==='white'?'白→黑':'黑→白',cx,indY+14);

    // combo
    if(state.combo>1){
        ctx.fillStyle='rgba(255,200,50,0.7)';
        ctx.font=`bold ${Math.min(W,H)*0.05}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(`x${state.combo}`,cx,H-Math.min(H*0.04,16));
    }

    // game over
    if(state.gameOver){
        ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
        const fs=Math.min(W,H)*0.1;
        ctx.fillStyle='#fff'; ctx.font=`bold ${fs}px "SF Pro Display","Helvetica Neue",Arial,sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('游戏结束',cx,cy-fs*0.8);
        ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font=`${fs*0.45}px "SF Pro Display","Helvetica Neue",Arial,sans-serif`;
        ctx.fillText(`得分: ${state.score}`,cx,cy+fs*0.1);
        if(state.score>=state.best&&state.score>0){
            ctx.fillStyle='#ffd700'; ctx.font=`bold ${fs*0.4}px sans-serif`; ctx.fillText('新纪录!',cx,cy+fs*0.6);
        }
        const bw=Math.min(W*0.5,220), bh=Math.min(H*0.07,50);
        const bx=cx-bw/2, by=cy+fs*1.1;
        ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,bh/2);
        ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font=`bold ${fs*0.35}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('再玩一次',cx,by+bh/2);
        state.restartBtn={x:bx,y:by,w:bw,h:bh};
    }else{state.restartBtn=null}
}

// ---- input (momentum) ----
function getPos(e){
    const t=e.touches?e.touches[0]:e;
    const r=canvas.getBoundingClientRect();
    return {x:t.clientX-r.left, y:t.clientY-r.top};
}
canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(state.gameOver&&state.restartBtn){const p=getPos(e),b=state.restartBtn; if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){initGame();return}}
    if(!state.gameOver)state.paddle.lastTouchX=getPos(e).x;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(state.gameOver||state.paddle.lastTouchX===null)return;
    const dx=getPos(e).x-state.paddle.lastTouchX;
    state.paddle.velocity=Math.max(-PADDLE_VMAX,Math.min(PADDLE_VMAX,state.paddle.velocity-dx*PADDLE_DRAG));
    state.paddle.lastTouchX=getPos(e).x;
},{passive:false});
canvas.addEventListener('touchend', ()=>{const p=state.paddle; if(p.velocity){p.velocity=Math.max(-PADDLE_VMAX,Math.min(PADDLE_VMAX,p.velocity*1.1))} p.lastTouchX=null});
canvas.addEventListener('touchcancel', ()=>{state.paddle.lastTouchX=null});
canvas.addEventListener('mousedown',e=>{
    e.preventDefault();
    if(state.gameOver&&state.restartBtn){const p=getPos(e),b=state.restartBtn; if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){initGame();return}}
    if(!state.gameOver)state.paddle.lastTouchX=getPos(e).x;
});
window.addEventListener('mousemove',e=>{
    if(state.gameOver||state.paddle.lastTouchX===null)return;
    const dx=getPos(e).x-state.paddle.lastTouchX;
    state.paddle.velocity=Math.max(-PADDLE_VMAX,Math.min(PADDLE_VMAX,state.paddle.velocity-dx*PADDLE_DRAG));
    state.paddle.lastTouchX=getPos(e).x;
});
window.addEventListener('mouseup', ()=>{const p=state.paddle; if(p.velocity){p.velocity=Math.max(-PADDLE_VMAX,Math.min(PADDLE_VMAX,p.velocity*1.1))} p.lastTouchX=null});

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
        if(r>w/2)r=w/2; if(r>h/2)r=h/2;
        this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
        this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
        this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
        this.closePath(); return this;
    };
}

// start
initGame();
function loop(){update(); draw(); requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
